services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: mini-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-mini_erp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-mini_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mini-erp-network

  # ─── NestJS Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-erp-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-mini_erp}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string_in_production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - mini-erp-network

volumes:
  postgres_data:

networks:
  mini-erp-network:
    name: mini-erp-network
    driver: bridge
